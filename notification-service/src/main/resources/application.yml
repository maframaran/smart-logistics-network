spring:
  application:
    name: notification-service
  threads:
    virtual:
      enabled: true   # Java 21 virtual threads (ADR-001)
  datasource:
    url: jdbc:postgresql://localhost:5432/logistics
    username: logistics
    password: logistics
    hikari:
      schema: notification
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: notification
  flyway:
    schemas: notification
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false
  kafka:
    bootstrap-servers: localhost:9092
    properties:
      schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8090}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
    consumer:
      group-id: notification-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer

management:
  endpoints:
    web:
      exposure:
        include: health,readiness,prometheus
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: 8080
