services:

  # ─── Infrastructure ───────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: logistics
      POSTGRES_USER: logistics
      POSTGRES_PASSWORD: logistics
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logistics"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "logistics-local-cluster"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ─── Services ─────────────────────────────────────────────────────────────────

  shipment-service:
    build:
      context: ./shipment-service
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/logistics
      SPRING_DATASOURCE_USERNAME: logistics
      SPRING_DATASOURCE_PASSWORD: logistics
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8081:8080"
    depends_on:
      postgres: { condition: service_healthy }
      kafka:    { condition: service_healthy }

  fleet-service:
    build:
      context: ./fleet-service
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/logistics
      SPRING_DATASOURCE_USERNAME: logistics
      SPRING_DATASOURCE_PASSWORD: logistics
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8082:8080"
    depends_on:
      postgres: { condition: service_healthy }
      kafka:    { condition: service_healthy }

  driver-service:
    build:
      context: ./driver-service
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/logistics
      SPRING_DATASOURCE_USERNAME: logistics
      SPRING_DATASOURCE_PASSWORD: logistics
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8083:8080"
    depends_on:
      postgres: { condition: service_healthy }
      kafka:    { condition: service_healthy }

  routing-service:
    build:
      context: ./routing-service
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/logistics
      SPRING_DATASOURCE_USERNAME: logistics
      SPRING_DATASOURCE_PASSWORD: logistics
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8084:8080"
    depends_on:
      postgres: { condition: service_healthy }
      kafka:    { condition: service_healthy }

  warehouse-service:
    build:
      context: ./warehouse-service
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/logistics
      SPRING_DATASOURCE_USERNAME: logistics
      SPRING_DATASOURCE_PASSWORD: logistics
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8085:8080"
    depends_on:
      postgres: { condition: service_healthy }
      kafka:    { condition: service_healthy }

  billing-service:
    build:
      context: ./billing-service
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/logistics
      SPRING_DATASOURCE_USERNAME: logistics
      SPRING_DATASOURCE_PASSWORD: logistics
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8086:8080"
    depends_on:
      postgres: { condition: service_healthy }
      kafka:    { condition: service_healthy }

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/logistics
      SPRING_DATASOURCE_USERNAME: logistics
      SPRING_DATASOURCE_PASSWORD: logistics
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8087:8080"
    depends_on:
      postgres: { condition: service_healthy }
      kafka:    { condition: service_healthy }

  rag-service:
    build:
      context: ./rag-service
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/logistics
      SPRING_DATASOURCE_USERNAME: logistics
      SPRING_DATASOURCE_PASSWORD: logistics
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8088:8080"
    depends_on:
      postgres: { condition: service_healthy }
      kafka:    { condition: service_healthy }

  logistics-ui:
    build:
      context: ./logistics-ui
      dockerfile: Dockerfile
    environment:
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-me-in-production
      SHIPMENT_SERVICE_URL: http://shipment-service:8081
      FLEET_SERVICE_URL: http://fleet-service:8082
      DRIVER_SERVICE_URL: http://driver-service:8083
      ROUTING_SERVICE_URL: http://routing-service:8084
      WAREHOUSE_SERVICE_URL: http://warehouse-service:8085
      BILLING_SERVICE_URL: http://billing-service:8086
      NOTIFICATION_SERVICE_URL: http://notification-service:8087
      RAG_SERVICE_URL: http://rag-service:8088
    ports:
      - "3000:3000"
    depends_on:
      - shipment-service
      - fleet-service
      - driver-service
      - routing-service
      - warehouse-service
      - billing-service
      - notification-service

volumes:
  postgres-data:
