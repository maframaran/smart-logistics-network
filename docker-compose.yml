services:

  # ─── Infrastructure ───────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: logistics
      POSTGRES_USER: logistics
      POSTGRES_PASSWORD: logistics
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logistics"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "tmy2KSP7RIaBugtZmxrJaQ"
      KAFKA_LOG_RETENTION_HOURS: 1
      KAFKA_LOG_SEGMENT_BYTES: 10485760
      KAFKA_LOG_RETENTION_BYTES: 104857600
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    ports:
      - "8090:8081"
    depends_on:
      kafka: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/subjects || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Services ─────────────────────────────────────────────────────────────────

  shipment-service:
    build:
      context: .
      dockerfile: shipment-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/logistics
      SPRING_DATASOURCE_USERNAME: logistics
      SPRING_DATASOURCE_PASSWORD: logistics
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    ports:
      - "8081:8080"
    depends_on:
      postgres:        { condition: service_healthy }
      kafka:           { condition: service_healthy }
      schema-registry: { condition: service_healthy }

  fleet-service:
    build:
      context: .
      dockerfile: fleet-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/logistics
      SPRING_DATASOURCE_USERNAME: logistics
      SPRING_DATASOURCE_PASSWORD: logistics
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    ports:
      - "8082:8080"
    depends_on:
      postgres:        { condition: service_healthy }
      kafka:           { condition: service_healthy }
      schema-registry: { condition: service_healthy }

  driver-service:
    build:
      context: .
      dockerfile: driver-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/logistics
      SPRING_DATASOURCE_USERNAME: logistics
      SPRING_DATASOURCE_PASSWORD: logistics
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    ports:
      - "8083:8080"
    depends_on:
      postgres:        { condition: service_healthy }
      kafka:           { condition: service_healthy }
      schema-registry: { condition: service_healthy }

  routing-service:
    build:
      context: .
      dockerfile: routing-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/logistics
      SPRING_DATASOURCE_USERNAME: logistics
      SPRING_DATASOURCE_PASSWORD: logistics
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    ports:
      - "8084:8080"
    depends_on:
      postgres:        { condition: service_healthy }
      kafka:           { condition: service_healthy }
      schema-registry: { condition: service_healthy }

  warehouse-service:
    build:
      context: .
      dockerfile: warehouse-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/logistics
      SPRING_DATASOURCE_USERNAME: logistics
      SPRING_DATASOURCE_PASSWORD: logistics
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    ports:
      - "8085:8080"
    depends_on:
      postgres:        { condition: service_healthy }
      kafka:           { condition: service_healthy }
      schema-registry: { condition: service_healthy }

  billing-service:
    build:
      context: .
      dockerfile: billing-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/logistics
      SPRING_DATASOURCE_USERNAME: logistics
      SPRING_DATASOURCE_PASSWORD: logistics
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    ports:
      - "8086:8080"
    depends_on:
      postgres:        { condition: service_healthy }
      kafka:           { condition: service_healthy }
      schema-registry: { condition: service_healthy }

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/logistics
      SPRING_DATASOURCE_USERNAME: logistics
      SPRING_DATASOURCE_PASSWORD: logistics
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    ports:
      - "8087:8080"
    depends_on:
      postgres:        { condition: service_healthy }
      kafka:           { condition: service_healthy }
      schema-registry: { condition: service_healthy }

  rag-service:
    build:
      context: .
      dockerfile: rag-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/logistics
      SPRING_DATASOURCE_USERNAME: logistics
      SPRING_DATASOURCE_PASSWORD: logistics
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8088:8080"
    depends_on:
      postgres:        { condition: service_healthy }
      kafka:           { condition: service_healthy }
      schema-registry: { condition: service_healthy }

  logistics-ui:
    build:
      context: ./logistics-ui
      dockerfile: Dockerfile
    environment:
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-me-in-production
      AUTH_TRUST_HOST: "true"
      SHIPMENT_SERVICE_URL: http://shipment-service:8080
      FLEET_SERVICE_URL: http://fleet-service:8080
      DRIVER_SERVICE_URL: http://driver-service:8080
      ROUTING_SERVICE_URL: http://routing-service:8080
      WAREHOUSE_SERVICE_URL: http://warehouse-service:8080
      BILLING_SERVICE_URL: http://billing-service:8080
      NOTIFICATION_SERVICE_URL: http://notification-service:8080
      RAG_SERVICE_URL: http://rag-service:8080
    ports:
      - "3000:3000"
    depends_on:
      - shipment-service
      - fleet-service
      - driver-service
      - routing-service
      - warehouse-service
      - billing-service
      - notification-service

volumes:
  postgres-data:
  kafka-data:
