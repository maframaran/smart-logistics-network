spring:
  application:
    name: fleet-service
  threads:
    virtual:
      enabled: true   # Java 21 virtual threads (ADR-001)
  datasource:
    url: jdbc:postgresql://localhost:5432/logistics
    username: logistics
    password: logistics
    hikari:
      schema: fleet
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: fleet
  flyway:
    schemas: fleet
  kafka:
    bootstrap-servers: localhost:9092
    properties:
      schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8090}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
    consumer:
      group-id: fleet-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer

kafka:
  topics:
    vehicle-registered: fleet.vehicle-registered
    vehicle-status-changed: fleet.vehicle-status-changed

management:
  endpoints:
    web:
      exposure:
        include: health,readiness,prometheus
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: 8080
